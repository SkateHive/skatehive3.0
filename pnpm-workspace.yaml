packages:
  - '.'

allowBuilds:
  argon2: true
  bufferutil: true
  core-js: true
  esbuild: true
  exifreader: true
  keccak: true
  secp256k1: true
  sharp: true
  unrs-resolver: true
  utf-8-validate: true

# hive-tx resolves via a GitHub tarball as a subdep of keychain-sdk;
# pnpm 11 blocks exotic subdeps by default.
blockExoticSubdeps: false

onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - bufferutil
  - core-js
  - esbuild
  - keccak
  - secp256k1
  - sharp
  - unrs-resolver
  - utf-8-validate
